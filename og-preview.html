<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1200" />
  <title>OG Preview</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Hurricane&family=Silkscreen:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 1200px;
      height: 630px;
      overflow: hidden;
      background: #010a04;
      font-family: 'Silkscreen', monospace;
      color: #f5f5f5;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* LEFT COL — headshot */
    .left {
      width: 420px;
      height: 630px;
      flex: none;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .headshot-wrap {
      position: relative;
      width: 300px;
      height: 300px;
    }
    .headshot-wrap::before {
      content: '';
      position: absolute;
      inset: -4px;
      border-radius: 50%;
      background: linear-gradient(135deg, #7da87a, #1e6b4a, #0a3d22);
      z-index: 0;
    }
    .headshot-wrap::after {
      content: '';
      position: absolute;
      inset: -18px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(30, 107, 74, 0.3) 0%, transparent 70%);
      z-index: -1;
    }
    .headshot-wrap img {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      object-fit: cover;
      position: relative;
      z-index: 1;
      display: block;
      border: 4px solid #010a04;
    }

    /* RIGHT COL — branding */
    .right {
      flex: 1;
      height: 630px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 60px 60px 60px 20px;
      position: relative;
    }

    /* divider line */
    .right::before {
      content: '';
      position: absolute;
      left: 0;
      top: 80px;
      bottom: 80px;
      width: 1px;
      background: linear-gradient(to bottom, transparent, rgba(125, 168, 122, 0.4), transparent);
    }

    .hero-name {
      position: relative;
      width: 100%;
      height: 200px;
      margin-bottom: 8px;
    }
    .name-first {
      position: absolute;
      top: 0; left: 18px;
      font-family: 'Hurricane', cursive;
      font-size: 74px;
      color: #a8bf9a;
      transform: rotate(-11deg);
      transform-origin: left 60%;
      line-height: 1;
      white-space: nowrap;
      text-shadow: 0 0 28px rgba(168, 191, 154, 0.35);
    }
    .name-last {
      position: absolute;
      top: 40px; left: 4px;
      font-family: 'Hurricane', cursive;
      font-size: 128px;
      color: #f1f5f9;
      transform: rotate(-6deg);
      transform-origin: left 60%;
      line-height: 1;
      white-space: nowrap;
      text-shadow: 0 0 28px rgba(241, 245, 249, 0.15);
    }
    .name-tld {
      position: absolute;
      bottom: 10px; right: 0;
      font-family: 'Silkscreen', monospace;
      font-size: 36px;
      font-weight: 400;
      color: #c9a84c;
      transform: rotate(-1deg);
      letter-spacing: -1px;
      text-shadow: 0 0 20px rgba(201, 168, 76, 0.4);
    }

    .tagline {
      font-family: 'Silkscreen', monospace;
      font-size: 11px;
      color: #4a7c5a;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      margin-top: 12px;
    }

    .url {
      margin-top: 28px;
      font-family: 'Silkscreen', monospace;
      font-size: 11px;
      color: rgba(168, 191, 154, 0.5);
      letter-spacing: 0.12em;
    }

    /* subtle grid texture */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(30, 107, 74, 0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(30, 107, 74, 0.04) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 100;
    }

    /* glow blobs */
    .blob1 {
      position: absolute;
      width: 400px; height: 400px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(30, 107, 74, 0.12) 0%, transparent 70%);
      top: -100px; left: -100px;
      pointer-events: none;
    }
    .blob2 {
      position: absolute;
      width: 300px; height: 300px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(201, 168, 76, 0.06) 0%, transparent 70%);
      bottom: -80px; right: -60px;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div class="blob1"></div>
  <div class="blob2"></div>

  <div class="left">
    <div class="headshot-wrap">
      <img src="images/dt-headshot2.png" alt="Daniel Thompson">
    </div>
  </div>

  <div class="right">
    <div class="hero-name">
      <span class="name-first">daniel</span>
      <span class="name-last">thompson</span>
      <span class="name-tld">.digital</span>
    </div>
    <div class="tagline">Digital Strategy &amp; Ecommerce Growth</div>
    <div class="url">danielthompson.digital</div>
  </div>
</body>
</html>
